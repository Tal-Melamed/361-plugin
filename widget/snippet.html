<!--
  Accessibility Widget — install snippet.
  Paste once, ideally just before </body>. Two parts:

  1) CRITICAL SHIM (inline, blocking, ~0.4kb): reads saved prefs and applies
     them to <html> BEFORE first paint, so returning visitors never see a flash
     of un-adjusted content (no FOUC). Mirrors the a11y-* class contract the
     main bundle uses.

  2) MAIN BUNDLE (async): the full widget. Loads without blocking parsing.

  Replace CDN_URL with your CDN (e.g. a jsDelivr GitHub-tag URL).
-->
<script>
  (function () {
    try {
      var raw = localStorage.getItem("bugbox_a11y");
      if (!raw) return;
      var s = JSON.parse(raw);
      var h = document.documentElement;
      var sizes = ["100%", "120%", "145%"];
      if (s.fontSize) h.style.setProperty("--a11y-font-scale", sizes[s.fontSize] || "100%");
      if (s.highContrast) h.classList.add("a11y-high-contrast");
      if (s.grayscale) h.classList.add("a11y-grayscale");
      if (s.highlightLinks) h.classList.add("a11y-highlight-links");
      if (s.bigCursor) h.classList.add("a11y-big-cursor");
    } catch (e) {}
  })();
</script>
<script src="CDN_URL/a11y.js" async defer></script>
